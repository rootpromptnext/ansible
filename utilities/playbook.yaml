---
- name: Install DevOps tools

  hosts: localhost
  gather_facts: true
  become: True
  become_user: root

  vars:
    install_awscli: true
    install_helm: true
    install_eksctl: true
    install_kubectl: true
    install_docker: true
    install_jenkins: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    # ---------------- AWS CLI ----------------
    - name: Install unzip
      apt:
        name: unzip
        state: present
      when: install_awscli

    - name: Download AWS CLI
      get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscliv2.zip
      when: install_awscli

    - name: Unzip AWS CLI
      unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: yes
      when: install_awscli

    - name: Install AWS CLI
      command: ./aws/install
      args:
        chdir: /tmp
      when: install_awscli

    # ---------------- Helm ----------------
    - name: Download Helm install script
      get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get_helm.sh
        mode: '0700'
      when: install_helm

    - name: Install Helm
      command: ./get_helm.sh
      args:
        chdir: /tmp
      when: install_helm

    # ---------------- eksctl ----------------
    - name: Download eksctl
      get_url:
        url: https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_{{ ansible_system }}_amd64.tar.gz
        dest: /tmp/eksctl.tar.gz
      when: install_eksctl

    - name: Extract eksctl
      unarchive:
        src: /tmp/eksctl.tar.gz
        dest: /tmp
        remote_src: yes
      when: install_eksctl

    - name: Move eksctl to /usr/local/bin
      command: mv /tmp/eksctl /usr/local/bin/
      when: install_eksctl

    # ---------------- kubectl ----------------
    - name: Download kubectl
      get_url:
        url: https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl
        dest: /usr/local/bin/kubectl
        mode: '0755'
      when: install_kubectl

    # ---------------- Docker ----------------
    - name: Install Docker prerequisites
      apt:
        name: [ca-certificates, curl]
        state: present
      when: install_docker

    - name: Add Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'
      when: install_docker

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch={{ ansible_architecture }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present
      when: install_docker

    - name: Install Docker packages
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-buildx-plugin, docker-compose-plugin]
        state: present
      when: install_docker

    # ---------------- Jenkins ----------------
    - name: Install OpenJDK
      apt:
        name: openjdk-21-jdk
        state: present
      when: install_jenkins

    - name: Add Jenkins key
      get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /usr/share/keyrings/jenkins-keyring.asc
      when: install_jenkins

    - name: Add Jenkins repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
        state: present
      when: install_jenkins

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present
      when: install_jenkins

    - name: Enable and start Jenkins
      systemd:
        name: jenkins
        state: started
        enabled: yes
      when: install_jenkins

    - name: Add users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop:
        - ubuntu
        - jenkins
      when: install_docker and install_jenkins
