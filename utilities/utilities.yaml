---
- name: Install DevOps CLI Tools
  hosts: localhost
  become: yes
  gather_facts: yes

  vars:
    install_awscli: true
    install_helm: true
    install_eksctl: true
    install_kubectl: true

  tasks:

    # -----------------------------
    # Common dependencies
    # -----------------------------
    - name: Install required packages
      apt:
        name:
          - curl
          - unzip
          - tar
        state: present
        update_cache: yes

    # -----------------------------
    # AWS CLI v2
    # -----------------------------
    - name: Check if AWS CLI exists
      command: aws --version
      register: aws_check
      ignore_errors: yes
      changed_when: false
      when: install_awscli

    - name: Download AWS CLI v2
      get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscliv2.zip
      when: install_awscli and aws_check.rc != 0

    - name: Unzip AWS CLI
      unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: yes
      when: install_awscli and aws_check.rc != 0

    - name: Install AWS CLI
      command: /tmp/aws/install
      when: install_awscli and aws_check.rc != 0

    # -----------------------------
    # kubectl (latest stable - dynamic)
    # -----------------------------

    - name: Get latest kubectl version
      uri:
        url: https://dl.k8s.io/release/stable.txt
        return_content: yes
      register: kubectl_latest
      when: install_kubectl

    - name: Check current kubectl version
      command: kubectl version --client --short
      register: kubectl_current
      ignore_errors: yes
      changed_when: false
      when: install_kubectl

    - name: Set kubectl version fact
      set_fact:
        kubectl_version: "{{ kubectl_latest.content | trim }}"
      when: install_kubectl

    - name: Download kubectl if missing or outdated
      get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'
      when: install_kubectl and (
              kubectl_current.rc != 0 or
              kubectl_version not in kubectl_current.stdout
            )

    # -----------------------------
    # eksctl
    # -----------------------------
    - name: Check if eksctl exists
      command: eksctl version
      register: eksctl_check
      ignore_errors: yes
      changed_when: false
      when: install_eksctl

    - name: Download eksctl
      get_url:
        url: https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz
        dest: /tmp/eksctl.tar.gz
      when: install_eksctl and eksctl_check.rc != 0

    - name: Extract eksctl
      unarchive:
        src: /tmp/eksctl.tar.gz
        dest: /tmp
        remote_src: yes
      when: install_eksctl and eksctl_check.rc != 0

    - name: Move eksctl binary
      copy:
        src: /tmp/eksctl
        dest: /usr/local/bin/eksctl
        mode: '0755'
        remote_src: yes
      when: install_eksctl and eksctl_check.rc != 0

    # -----------------------------
    # Helm
    # -----------------------------
    - name: Check if helm exists
      command: helm version --short
      register: helm_check
      ignore_errors: yes
      changed_when: false
      when: install_helm

    - name: Download Helm
      get_url:
        url: https://get.helm.sh/helm-v3.15.0-linux-amd64.tar.gz
        dest: /tmp/helm.tar.gz
      when: install_helm and helm_check.rc != 0

    - name: Extract Helm
      unarchive:
        src: /tmp/helm.tar.gz
        dest: /tmp
        remote_src: yes
      when: install_helm and helm_check.rc != 0

    - name: Move Helm binary
      copy:
        src: /tmp/linux-amd64/helm
        dest: /usr/local/bin/helm
        mode: '0755'
        remote_src: yes
      when: install_helm and helm_check.rc != 0

    # -----------------------------
    # Verification (only if enabled)
    # -----------------------------
    - name: Verify AWS CLI
      command: aws --version
      register: aws_version
      changed_when: false
      when: install_awscli

    - debug:
        var: aws_version.stdout
      when: install_awscli

    - name: Verify kubectl
      command: kubectl version --client
      register: kubectl_version
      changed_when: false
      when: install_kubectl

    - debug:
        var: kubectl_version.stdout
      when: install_kubectl

    - name: Verify eksctl
      command: eksctl version
      register: eksctl_version
      changed_when: false
      when: install_eksctl

    - debug:
        var: eksctl_version.stdout
      when: install_eksctl

    - name: Verify helm
      command: helm version --short
      register: helm_version
      changed_when: false
      when: install_helm

    - debug:
        var: helm_version.stdout
      when: install_helm
